services:
  - type: web
    name: todo-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start

    envVars:
      - key: DATABASE_URL
        value: file:/var/data/todo.db

    disk:
      name: todo-sqlite-volume
      mountPath: /var/data
      sizeGB: 1